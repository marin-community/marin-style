name: Disabled agent prose cleanup
description: >
  Temporarily disables automated edits to agent-generated issue and pull request
  descriptions.

inputs:
  repo-token:
    description: Token used to read existing issue or pull request comments.
    required: false
    default: ${{ github.token }}
  trigger-token:
    description: >
      PAT used to post the request to @weaverbot. Its owner must be a
      loom-approved user other than weaverbot. Empty skips the request.
    required: false
    default: ''
  cleanup-notes:
    description: Trusted repository-specific instructions appended to the request.
    required: false
    default: ''

outputs:
  requested:
    description: Whether this invocation posted a new cleanup request.
    value: ${{ steps.request.outputs.requested }}
  reason:
    description: Why the request was posted or skipped.
    value: ${{ steps.request.outputs.reason }}

runs:
  using: composite
  steps:
    - name: Leave description unchanged
      id: request
      shell: bash
      run: |
        set -euo pipefail
        echo "::notice::Automated prose cleanup is temporarily disabled."
        printf 'requested=false\nreason=disabled\n' >> "$GITHUB_OUTPUT"
